<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="aula7.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Aula7</title>
</head>
<body class="bg-primary bg-gradient">
    <div class="container mt-3">
        <div class="topo">
            CAIXA LIVRE
        </div>
        <div class="row mt-3">

            <div class="col-md-7">
                <h3 class="text-white"><span class="badge text-bg-primary">Sua compra</span></h3>
                <ul id="lista" class="list-group lista"></ul>
            </div>

            <div class="col-md-5">
                <div class="painel">Total: R$ <span class="total">0.00</span></div>
                
                <div class="painel">
                    <label for="">Código de barras</label>
                    <input type="text" id="cod" class="form-control">
                </div>

                <div class="painel">
                    <label for="">Quantidade</label>
                    <input type="number" id="qtd" class="form-control" min="1" value="1">
                </div>

                <div class="painel">Sub-total: R$ <span id="sub">0.00</span></div>

                <button class="btn btn-success w-100" onclick="addProduto()">Adicionar Produto</button>

            </div>

        </div>
    </div>

    <script src="aula7.js"></script>
</body>
</html>
