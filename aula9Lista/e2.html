<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <style>
        body{
            background-color: antiquewhite;
        }
        h1{
            text-align: center;
        }

        #cIn{
            background-color: aliceblue;
            
        }
    </style>

    <title>conversor de temperatura</title>
</head>
<body>
    <div class="container">
        <h1>Conversor de temperatura</h1>
    </div>

    <div class="container row-2" id="cIn">
        <div class="col">
            <label for="cel">Celsius:</label>
            <input type="number" id="cel" placeholder="0.00" step="0.1">
        </div>

        <div class="col">
            <label for="fah">Fahrenheit: </label>
            <input type="number" id="fah" placeholder="32.00" step="0.1">
        </div>

    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <script>
        document.getElementById("cel").addEventListener('input',function(e){
            let c=document.getElementById("cel").value;
            let f=document.getElementById("fah").value;

            f=(c*9/5)+32;

            document.getElementById("fah").placeholder = `${f.toFixed(2)}`;
        });
        
        document.getElementById("fah").addEventListener('input',function(e){
            let c=document.getElementById("cel").value;
            let f=document.getElementById("fah").value;

            c=(f-32)*5/9;

            document.getElementById("cel").placeholder = `${c.toFixed(2)}`;
        });
    </script>
</body>
</html>
