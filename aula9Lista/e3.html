<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <style>
        body{
            background-color: antiquewhite;
        }
        h1{
            text-align: center;
        }

        #cIn{
            background-color: aliceblue;
            
        }
    </style>

    <title>conversor de temperatura</title>
</head>
<body>
    <div class="container">
        <h1>Conversor de temperatura</h1>
    </div>

    <div class="container row-2" id="cIn">
        <div class="col">
            <label for="nome">Nome: </label>
            <input type="text" id="nome" placeholder="Nome">
        </div>

        <div class="col">
            <label for="n1">Nota1:</label>
            <input type="number" id="n1" placeholder="1">
        </div>

        <div class="col">
            <label for="n2">Nota2: </label>
            <input type="number" id="n2" placeholder="2">
        </div>

        <div class="col">
            <label for="n3">Nota3: </label>
            <input type="number" id="n3" placeholder="3">
        </div>
        <p id="med">Media: </p>
        <p id="sit">Situação: </p>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <script>
        var n1=document.getElementById("n1").value;
        var n2=document.getElementById("n2").value;
        var n3=document.getElementById("n3").value;

        document.getElementById("n1").addEventListener('input',function(e){
            n1=document.getElementById("n1").value;

            return(calculo(Number(n1),Number(n2),Number(n3)));
        });
        
        document.getElementById("n2").addEventListener('input',function(e){
            n2=document.getElementById("n2").value;

            return(calculo(Number(n1),Number(n2),Number(n3)));
        });

        document.getElementById("n3").addEventListener('input',function(e){
            n3=document.getElementById("n3").value;

            return(calculo(Number(n1),Number(n2),Number(n3)));
        });

        function calculo(n1,n2,n3){
            let media=(n1+n2+n3)/3;

            if(media>=70){
                document.getElementById("med").innerHTML=`<p class="text-success" id="med">Media: ${media.toFixed(2)}</p>`;
                document.getElementById("sit").innerHTML=`<p class="text-success" id="sit">Situação: Aprovado</p>`;
            }else if(media>=40){
                document.getElementById("med").innerHTML=`<p class="text-primary" id="med">Media: ${media.toFixed(2)}</p>`;
                document.getElementById("sit").innerHTML=`<p class="text-primary" id="sit">Situação: Exame</p>`;
            }else{
                document.getElementById("med").innerHTML=`<p class="text-danger" id="med">Media: ${media.toFixed(2)}</p>`;
                document.getElementById("sit").innerHTML=`<p class="text-danger" id="sit">Situação: Reprovado</p>`;
            }
        }
        
    </script>
</body>
</html>
