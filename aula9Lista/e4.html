<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Infinity Bank</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">


  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      width: 350px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      color: #1b2a49;
    }

    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }

    input, select, button {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {
      background: #1b2a49;
      color: white;
      border: none;
      cursor: pointer;
      margin-top: 20px;
    }

    button:hover {
      background: #324a74;
    }

    .resultado {
      margin-top: 20px;
      background: #eef2f7;
      padding: 15px;
      border-radius: 8px;
    }

    .resultado p {
      margin: 8px 0;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>Infinity Bank</h2>

    <label for="bandeira">Bandeira</label>
    <select id="bandeira">
      <option value="0.02">Visa - 2%</option>
      <option value="0.0185">Master - 1.85%</option>
      <option value="0.03">Elo - 3%</option>
    </select>

    <label for="valor">Valor da Compra</label>
    <input type="number" id="valor" placeholder="Digite o valor">

    <label for="parcelas">Número de Parcelas</label>
    <input type="number" id="parcelas" placeholder="Digite as parcelas">

    <button onclick="calcular()">Calcular</button>

    <div class="resultado" id="resultado">
      <p><strong>Valor da Taxa:</strong> R$ 0,00</p>
      <p><strong>Valor dos Juros:</strong> R$ 0,00</p>
      <p><strong>Taxa Mensal:</strong> R$ 0,00</p>
      <p><strong>Valor de Cada Parcela:</strong> R$ 0,00</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  
  <script>
    function calcular() {

      const valor=parseFloat(document.getElementById("valor").value);
      const parcelas=parseInt(document.getElementById("parcelas").value);
      const taxaBandeira=parseFloat(document.getElementById("bandeira").value);
      const valorTaxa=valor*taxaBandeira;
      const juros=valor*(0.0035*parcelas);
      const taxaMensal=12.50*parcelas;
      const total=valor+valorTaxa+juros+taxaMensal;
      const valorParcela=total/parcelas;

      document.getElementById("resultado").innerHTML = `
        <p><strong>Valor da Taxa:</strong> R$ ${valorTaxa.toFixed(2)}</p>
        <p><strong>Valor dos Juros:</strong> R$ ${juros.toFixed(2)}</p>
        <p><strong>Taxa Mensal:</strong> R$ ${taxaMensal.toFixed(2)}</p>
        <p><strong>Valor de Cada Parcela:</strong> R$ ${valorParcela.toFixed(2)}</p>
      `;
    }
  </script>

</body>
</html>
