<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Infinity Bank</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">


  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      width: 350px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      color: #1b2a49;
    }

    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }

    input, select, button {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {
      background: #1b2a49;
      color: white;
      border: none;
      cursor: pointer;
      margin-top: 20px;
    }

    button:hover {
      background: #324a74;
    }

    .resultado {
      margin-top: 20px;
      background: #eef2f7;
      padding: 15px;
      border-radius: 8px;
    }

    .resultado p {
      margin: 8px 0;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>Infinity Bank</h2>

    <label for="pacote">Pacote</label>
    <select id="pacote">
      <option value="50.00">Standard: R$ 50,00 por pessoa</option>
      <option value="80.00">Premium: R$ 80,00 por pessoa</option>
      <option value="120.00">Deluxe: R$ 120,00 por pessoa</option>
    </select>

    <label for="quant">Quantidade de pessoas</label>
    <input type="number" id="quant" placeholder="Digite a quantiade de pessoas">

    <button onclick="calcular()">Calcular Orçamento</button>

    <div class="resultado" id="resultado">
      <p><strong>Custo bruto:</strong> R$ 0,00</p>
      <p><strong>Taxa de serviço:</strong> R$ 0,00</p>
      <p><strong>Desconto aplicado:</strong> R$ 0,00</p>
      <p><strong>Valor final:</strong> R$ 0,00</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  
  <script>
    function calcular() {
      const quant=parseFloat(document.getElementById("quant").value);
      const pacote=parseFloat(document.getElementById("pacote").value);
      const valorPacote=pacote*quant;
      const taxaServico=valorPacote/10;
      const valor=valorPacote+taxaServico;
      let desconto;

      if(quant>=100){
        desconto=valor-(valor*0.05);
      }else{
        desconto=0;
      }

      document.getElementById("resultado").innerHTML = `
        <p><strong>Custo bruto:</strong> R$ ${valorPacote.toFixed(2)}</p>
        <p><strong>Taxa de serviço:</strong> R$ ${taxaServico.toFixed(2)}</p>
        <p><strong>Desconto aplicado:</strong> R$ ${desconto.toFixed(2)}</p>
        <p><strong>Valor final:</strong> R$ ${valor.toFixed(2)}</p></p>
      `;
    }
  </script>

</body>
</html>
